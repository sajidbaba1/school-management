# ================================
# APPLICATION CONFIGURATION
# School Management System
# ================================

# Server Port
server.port=8080
server.servlet.context-path=/api/v1

# ================================
# DATABASE CONFIGURATION (MySQL)
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/school_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / HIBERNATE CONFIGURATION
# ================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT CONFIGURATION
# ================================
app.jwt.secret=school_management_super_secret_key_change_this_in_production
app.jwt.expiration=86400000

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# LOGGING
# ================================
logging.level.com.school.management=DEBUG
logging.level.org.springframework.security=DEBUG

# ================================
# APPLICATION INFO
# ================================
spring.application.name=school-management-backend
